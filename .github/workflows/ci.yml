name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download deps
        run: go mod tidy

      - name: Run tests
        run: go test -v ./...

      - name: Run race detector
        run: go test -race ./...

      - name: Run benchmarks
        run: go test -bench=. -benchmem ./...

      - name: Run demo
        run: go run examples/demo.go